project_name: "Connect_Intelligence_Superannuation_Retention"
version: "2.0.0"

data:
  raw_path:       "data/raw/Bank Customer Churn Prediction.csv"
  processed_path: "data/processed/cleaned_churn_data.csv"
  feature_path:   "data/processed/final_feature_set.csv"
  segmented_path: "data/processed/segmented_members_final.csv"

modeling:
  test_size:           0.20
  random_state:        42
  churn_target:        "churn"
  n_estimators:        400
  max_depth:           5
  learning_rate:       0.05
  subsample:           0.80
  colsample_bytree:    0.80
  n_clusters:          5
  cv_folds:            5

artifacts:
  model_path:   "models/churn_model_gb.pkl"
  scaler_path:  "models/standard_scaler.pkl"
  metrics_path: "models/model_metrics.json"

business_logic:
  retirement_age:            65
  preservation_age:          60
  high_engagement_threshold: 0.70
  high_balance_threshold:    100000
  precision_target:          0.55    # minimum acceptable precision on churner class
  recall_target:             0.60    # minimum acceptable recall on churner class

api:
  host: "0.0.0.0"
  port: 8000

personas:
  0: "Stable Savers"
  1: "Wealth Builders"
  2: "High Value At Risk"
  3: "Disengaged Youth"
  4: "Pre-Retirees"
